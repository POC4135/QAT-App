name: flutter-verify

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.4

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Trust proof verification
        env:
          CHROME_EXECUTABLE: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: bash tool/trust_proof.sh

      - name: Basic secret scan
        shell: bash
        run: |
          if grep -RInE \
            --exclude-dir=.git \
            --exclude-dir=build \
            --exclude=pubspec.lock \
            --exclude='*.png' \
            'AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|-----BEGIN (RSA|EC|DSA|OPENSSH|PRIVATE) KEY-----|ghp_[0-9A-Za-z]{36}|xox[baprs]-[0-9A-Za-z-]+' \
            .; then
            echo "Potential secret pattern detected"
            exit 1
          fi
          echo "No secret patterns found"
